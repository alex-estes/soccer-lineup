<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eagles Soccer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
  :root {
    --green: #7c6af7; --green-light: #a89bf9; --green-dark: #1a1826;
    --gold: #a89bf9; --white: #e8e6f0; --gray: #6b6880;
    --dark: #13111a; --card: #1e1b2e; --border: rgba(255,255,255,0.07);
    --def: #5b9ef9; --mid: #a89bf9; --fwd: #f97b8b;
    --played-border: rgba(168,155,249,0.35); --locked-color: #a89bf9;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--dark); color: var(--white); font-family: 'Inter', sans-serif; min-height: 100vh; padding-bottom: 72px; }

  header {
    background: rgba(19,17,26,0.6);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    box-shadow: 0 4px 24px rgba(30,10,60,0.45);
    padding: 8px 20px 10px; display: flex; flex-direction: column; gap: 4px;
    position: sticky; top: 0; z-index: 40;
  }
  .header-brand { gap: 4px;display: flex; align-items: center; }
  .header-main-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .header-left { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
  header h1 { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--gold); }
  .header-game-name { font-family: 'Inter', sans-serif; font-weight: 600; font-size: 0.75rem; color: rgba(255,255,255,0.35); letter-spacing: 0.05em; text-transform: uppercase; }
  .header-rotation-label { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 0.68rem; letter-spacing: 0.08em; color: var(--green-light); text-transform: uppercase; background: rgba(168,155,249,0.1); border: 1px solid rgba(168,155,249,0.25); border-radius: 4px; padding: 2px 8px; }
  .header-menu-wrap { position: relative; }
  .header-dropdown {
    position: absolute; right: 0; top: calc(100% + 6px);
    background: #1e1b2e; border: 1px solid var(--border);
    border-radius: 8px; padding: 4px; min-width: 150px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    display: none; flex-direction: column; gap: 2px; z-index: 50;
  }
  .header-dropdown.open { display: flex; }
  .header-dropdown button {
    background: transparent; border: none; color: var(--white);
    font-family: 'Inter', sans-serif; font-size: 0.82rem; font-weight: 600;
    letter-spacing: 0.03em; text-transform: uppercase;
    padding: 9px 12px; border-radius: 6px; cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    transition: background 0.15s;
  }
  .header-dropdown button:hover { background: rgba(255,255,255,0.07); }
  .header-dropdown button i { font-size: 1rem; }
  .btn { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 0.78rem; letter-spacing: 0.03em; text-transform: uppercase; padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; transition: all 0.3s; display: inline-flex; align-items: center; gap: 8px; }
  .btn-primary {
    background-image: linear-gradient(160deg, #8b7cf8 0%, #5a45d4 100%);
    background-size: 200% auto;
    color: var(--white);
    box-shadow: 0 0 12px rgba(90,69,212,0.5);
    border-radius: 8px;
    border: none;
  }
  .btn-primary:hover { background-position: right center; transform: translateY(-1px); box-shadow: 0 0 20px rgba(90,69,212,0.7); }
  .btn-secondary { background: transparent; color: var(--white); border: 1.5px solid var(--border); }
  .btn-secondary:hover { border-color: var(--gold); color: var(--gold); }
  .btn i, .seg-btn i { font-size: 1rem; line-height: 1; flex-shrink: 0; }
  .btn-danger { background: transparent; color: rgba(242,94,94,0.7); border: 1px solid rgba(242,94,94,0.2); border-radius: 6px; padding: 4px 4px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; transition: all 0.2s; font-size: 0.85rem; line-height: 1; }
  .btn-danger:hover { background: rgba(242,94,94,0.1); color: #f25e5e; border-color: rgba(242,94,94,0.4); }
  .btn-add { background-image: linear-gradient(160deg, #8b7cf8 0%, #5a45d4 100%); background-size: 200% auto; color: white; border: none; border-radius: 6px; padding: 6px 10px; cursor: pointer; font-size: 0.9rem; font-weight: 700; transition: all 0.3s; box-shadow: 0 0 10px rgba(90,69,212,0.5); display: inline-flex; align-items: center; justify-content: center; line-height: 1; }
  .btn-add:hover { background-position: right center; box-shadow: 0 0 16px rgba(90,69,212,0.7); }
  .seg-btn.active {
    background-image: linear-gradient(160deg, #8b7cf8 0%, #5a45d4 100%);
    background-size: 200% auto;
    color: var(--white);
    border-radius: 4px;
    transition: background-position 0.3s;
  }
  .seg-btn.active:hover { background-position: right center; }
  .btn { display: inline-flex; align-items: center; gap: 4px; }
  .btn i, .seg-btn i { font-size: 1rem; line-height: 1; flex-shrink: 0; }
  .sidebar-section h3 { display: flex; align-items: center; gap: 4px; }
  .sidebar-section h3 i { font-size: 0.82rem; opacity: 0.65; }

  .main { display: grid; grid-template-columns: 290px 1fr; min-height: calc(100vh - 61px); }

  /* SIDEBAR */
  .sidebar { background: var(--card); border-right: 1px solid var(--border); padding: 16px; display: flex; flex-direction: column; gap: 18px; overflow-y: auto; }
  .sidebar-section h3 { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gray); margin-bottom: 8px; }
  .player-list { display: flex; flex-direction: column; gap: 5px; }
  .player-chip { background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 8px; padding: 4px 8px; display: flex; align-items: center; gap: 8px; transition: all 0.15s; user-select: none; }
  .player-chip:hover { border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.08); }
  .player-chip.inactive { opacity: 0.45; }
  .player-chip.inactive .player-name-input { text-decoration: line-through; }
  .active-toggle { background: none; border: none; cursor: pointer; padding: 0 4px; font-size: 1rem; line-height: 1; transition: color 0.15s; flex-shrink: 0; color: var(--gray); }
  .active-toggle.is-active { color: var(--green-light); }
  .active-toggle:hover { opacity: 0.8; }
  .stat-row.inactive { opacity: 0.4; }
  .player-num { width: 20px; height: 20px; background: var(--green-dark); border-radius: 50%; font-family: 'Inter', sans-serif; font-weight: 800; font-size: 0.65rem; display: flex; align-items: center; justify-content: center; color: var(--gold); flex-shrink: 0; }
  .player-name-input { background: transparent; border: none; color: var(--white); font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 500; width: 100%; outline: none; }
  .player-name-input::placeholder { color: var(--gray); }
  .add-player-row { display: flex; gap: 6px; margin-top: 8px; }
  .add-player-row input { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 4px; color: var(--white); font-family: 'Inter', sans-serif; font-size: 0.82rem; padding: 6px 9px; outline: none; }
  .add-player-row input:focus { border-color: var(--gold); }
  .add-player-row input::placeholder { color: var(--gray); }
  .btn-add { background-image: linear-gradient(160deg, #8b7cf8 0%, #5a45d4 100%); background-size: 200% auto; color: white; border: none; border-radius: 6px; padding: 6px 11px; cursor: pointer; font-size: 1rem; font-weight: 700; transition: all 0.3s; box-shadow: 0 0 10px rgba(90,69,212,0.5); }
  .btn-add:hover { background-position: right center; box-shadow: 0 0 16px rgba(90,69,212,0.7); }

  .legend { display: flex; gap: 10px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 4px; font-size: 0.78rem; color: var(--gray); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  /* STATS */
  .stats-grid { display: flex; flex-direction: column; gap: 3px; }
  .stat-header { display: grid; grid-template-columns: 1fr 22px 22px 22px 22px 26px; gap: 3px; padding: 0 5px 4px; font-family: 'Inter', sans-serif; font-size: 0.62rem; letter-spacing: 0.08em; color: var(--gray); text-transform: uppercase; border-bottom: 1px solid var(--border); margin-bottom: 3px; }
  .stat-header span { text-align: center; }
  .stat-row { display: grid; grid-template-columns: 1fr 22px 22px 22px 22px 26px; gap: 3px; align-items: center; font-size: 0.78rem; padding: 4px 8px; border-radius: 4px; }
  .stat-row:nth-child(odd) { background: rgba(255,255,255,0.03); }
  .stat-row .sname { color: var(--white); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .stat-val { text-align: center; font-family: 'Inter', sans-serif; font-weight: 700; font-size: 0.78rem; }
  .stat-val.def { color: var(--def); }
  .stat-val.mid { color: var(--mid); }
  .stat-val.fwd { color: var(--fwd); }
  .stat-val.tot { color: var(--white); }
  .stat-val.goals { color: #ffb3c6; }

  /* CONTENT */
  .content { padding: 18px; overflow: visible; }
  .content-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
  .content-header h2 { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 0.04em; }
  .game-label { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 0.72rem; letter-spacing: 0.08em; color: var(--gold); text-transform: uppercase; background: rgba(168,155,249,0.08); border: 1px solid rgba(168,155,249,0.25); border-radius: 4px; padding: 3px 9px; }
  .rotation-label { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 0.72rem; letter-spacing: 0.08em; color: var(--green-light); text-transform: uppercase; background: rgba(168,155,249,0.08); border: 1px solid rgba(168,155,249,0.25); border-radius: 4px; padding: 3px 9px; display: none; }
  .game-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
  .game-tab { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 0.75rem; letter-spacing: 0.04em; text-transform: uppercase; padding: 4px 8px; border-radius: 4px; border: 1.5px solid var(--border); background: transparent; color: var(--gray); cursor: pointer; transition: all 0.15s; }
  .game-tab.active { border-color: var(--gold); color: var(--gold); background: rgba(168,155,249,0.07); }
  .game-tab:hover:not(.active) { border-color: rgba(255,255,255,0.2); color: var(--white); }
  .btn-new-game { background: rgba(255,255,255,0.04); border: 1.5px dashed rgba(255,255,255,0.14); color: var(--gray); border-radius: 4px; padding: 4px 8px; cursor: pointer; font-family: 'Inter', sans-serif; font-weight: 700; font-size: 0.75rem; letter-spacing: 0.04em; text-transform: uppercase; transition: all 0.15s; }
  .btn-new-game:hover { border-color: var(--gold); color: var(--gold); }
  .notice { background: rgba(168,155,249,0.06); border: 1px solid rgba(168,155,249,0.2); border-radius: 5px; padding: 8px 12px; font-size: 0.79rem; color: rgba(168,155,249,0.85); margin-bottom: 14px; }

  /* ROTATION CARDS */
  .rotations { display: flex; flex-direction: column; gap: 8px; }
  .rotation-card { background: var(--card); border:1.5px solid var(--border); border-radius: 8px; overflow: visible; transition: border-color 0.2s; }
  .rotation-card.is-played { border-color: var(--played-border); background: #17142a; }
  .rotation-card.is-played .rotation-header { background: #201d35; }
  .rotation-header { background: var(--green-dark); padding: 8px 14px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; border-radius: 8px 8px 0px 0px;}
  .rotation-num { font-family: 'Inter', sans-serif; font-weight: 600; font-size: 0.8rem; color: var(--gold); letter-spacing: 0.06em; text-transform: uppercase; white-space: nowrap; }
  .played-badge { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase; background: rgba(168,155,249,0.12); border: 1.5px solid rgba(168,155,249,0.35); color: var(--green-light); border-radius: 4px; padding: 4px 8px; display: inline-flex; align-items: center; gap: 4px; }
  .current-badge { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase; background: rgba(168,155,249,0.15); border: 1.5px solid rgba(168,155,249,0.45); color: var(--gold); border-radius: 4px; padding: 4px 8px; display: inline-flex; align-items: center; gap: 4px; }
  .upcoming-badge { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase; background: rgba(255,255,255,0.05); border: 1.5px solid rgba(255,255,255,0.12); color: var(--gray); border-radius: 4px; padding: 4px 8px; display: inline-flex; align-items: center; gap: 4px; }

  /* PLAYED TOGGLE */
  .played-toggle { margin-left: auto; display: flex; align-items: center; gap: 6px; cursor: pointer; user-select: none; }
  .played-toggle input[type=checkbox] { display: none; }
  .toggle-track { width: 34px; height: 18px; border-radius: 9px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); position: relative; transition: background 0.2s; flex-shrink: 0; }
  .toggle-track::after { content: ''; position: absolute; top: 2px; left: 2px; width: 12px; height: 12px; border-radius: 50%; background: var(--gray); transition: all 0.2s; }
  .played-toggle.on .toggle-track { background: rgba(168,155,249,0.2); border-color: rgba(168,155,249,0.4); }
  .played-toggle.on .toggle-track::after { left: 18px; background: var(--green-light); }
  .toggle-label { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 0.65rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--gray); }
  .played-toggle.on .toggle-label { color: var(--green-light); }

  /* FIELD */
  .rotation-field { display: grid; grid-template-columns: repeat(3, 1fr); overflow: visible; }
  .position-group { padding: 10px; border-right: 1px solid var(--border); overflow: visible; }
  .position-group:last-child { border-right: none; }
  .position-label { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 7px; display: flex; align-items: center; gap: 5px; }
  .pos-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .position-slots { display: flex; flex-direction: column; gap: 5px; overflow: visible; }

  /* SLOTS */
  .slot { background: rgba(255,255,255,0.04); border: 1.5px dashed rgba(255,255,255,0.12); border-radius: 6px; min-height: 38px; display: flex; align-items: stretch; transition: all 0.15s; overflow: visible; position: relative; }
  .slot.filled { border-style: solid; }
  .slot.def.filled { border-color: rgba(58,130,247,0.45); background: rgba(58,130,247,0.07); }
  .slot.mid.filled { border-color: rgba(168,155,249,0.45); background: rgba(168,155,249,0.07); }
  .slot.fwd.filled { border-color: rgba(242,94,94,0.45); background: rgba(242,94,94,0.07); }
  .slot.locked.def.filled { border-color: rgba(58,130,247,0.9); box-shadow: inset 0 0 0 1px rgba(58,130,247,0.25); }
  .slot.locked.mid.filled { border-color: rgba(168,155,249,0.9); box-shadow: inset 0 0 0 1px rgba(168,155,249,0.25); }
  .slot.locked.fwd.filled { border-color: rgba(242,94,94,0.9); box-shadow: inset 0 0 0 1px rgba(242,94,94,0.25); }
  .slot:hover { border-color: rgba(255,255,255,0.25); }
  .slot.drag-target { border-color: var(--gold) !important; background: rgba(168,155,249,0.08) !important; border-style: solid !important; }
  .slot-inner { display: flex; align-items: center; width: 100%; padding: 6px 8px; gap: 5px; cursor: grab; position: relative; }
  .slot-inner:active { cursor: grabbing; }
  .swap-btn { display: none; } /* hidden on desktop, shown in mobile media query */
  .slot-name { font-weight: 600; font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
  .slot-empty { color: var(--gray); font-size: 0.77rem; font-style: italic; padding: 6px 8px; align-self: center; }

  /* LOCK BUTTON */
  .lock-btn { background: none; border: none; cursor: pointer; padding: 0 4px 0 0; font-size: 0.78rem; transition: opacity 0.15s; flex-shrink: 0; line-height: 1; color: rgba(255,255,255,0.8); opacity: 0.8; }
  .lock-btn:hover { opacity: 1; }
  .slot.locked .lock-btn { color: var(--green-light); opacity: 1; }

  /* BENCH */
  .bench-row { border-top: 1px solid var(--border); padding: 8px 14px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .bench-label { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gray); white-space: nowrap; }
  .bench-slots { display: flex; gap: 5px; flex-wrap: wrap; }
  .bench-slot { background: rgba(255,255,255,0.04); border: 1.5px dashed rgba(255,255,255,0.11); border-radius: 5px; padding: 5px 10px; font-size: 0.82rem; font-weight: 500; cursor: default; transition: all 0.15s; color: var(--gray); min-width: 60px; text-align: center; }
  .bench-slot.filled { border-style: solid; border-color: rgba(255,255,255,0.18); color: var(--white); background: rgba(255,255,255,0.05); cursor: grab; }
  .bench-slot.filled:active { cursor: grabbing; }
  .bench-slot:hover { border-color: rgba(255,255,255,0.22); }
  .bench-slot.drag-target { border-color: var(--gold) !important; border-style: solid !important; background: rgba(168,155,249,0.07) !important; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.72); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 22px; width: 360px; max-width: 95vw; }
  .modal h3 { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 1rem; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 14px; color: var(--gold); }
  .modal-body { display: flex; flex-direction: column; gap: 9px; margin-bottom: 18px; }
  .modal-input { background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 6px; color: var(--white); font-family: 'Inter', sans-serif; font-size: 0.88rem; padding: 8px 11px; outline: none; width: 100%; }
  .modal-input:focus { border-color: var(--gold); }
  .modal-input::placeholder { color: var(--gray); }
  .modal-footer { display: flex; gap: 8px; justify-content: flex-end; }

  /* GOALS MODAL */
  .goals-list { display: flex; flex-direction: column; gap: 8px; max-height: 260px; overflow-y: auto; }
  .goal-row { display: flex; align-items: center; gap: 10px; padding: 4px 0; }
  .goal-row .gname { flex: 1; font-size: 0.88rem; font-weight: 500; }
  .goal-stepper { display: flex; align-items: center; gap: 6px; }
  .goal-stepper button { width: 26px; height: 26px; border-radius: 4px; border: 1px solid var(--border); background: rgba(255,255,255,0.06); color: var(--white); font-size: 1.1rem; line-height: 1; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.12s; }
  .goal-stepper button:hover { background: rgba(255,255,255,0.15); }
  .goal-count { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 1.05rem; min-width: 24px; text-align: center; color: #ffb3c6; }
  .opponent-score-section { border-top: 1px solid var(--border); margin-top: 14px; padding-top: 14px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
  .opponent-score-row { display: flex; align-items: center; gap: 10px; }
  .opponent-label { flex: 1; font-size: 0.88rem; font-weight: 600; display: flex; align-items: center; gap: 6px; color: var(--white); }
  .opponent-label i { color: var(--gray); }
  .score-summary { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 1rem; text-align: center; padding: 8px 12px; border-radius: 6px; background: rgba(255,255,255,0.04); letter-spacing: 0.04em; }
  .score-summary.win { color: var(--green-light); background: rgba(168,155,249,0.08); border: 1px solid rgba(168,155,249,0.2); }
  .score-summary.loss { color: var(--fwd); background: rgba(255,107,107,0.08); border: 1px solid rgba(255,107,107,0.2); }
  .score-summary.tie { color: var(--gray); background: rgba(255,255,255,0.05); border: 1px solid var(--border); }

  /* SEASON RECORD */
  .season-record { display: flex; gap: 8px; justify-content: space-between; }
  .record-chip { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 8px 6px; border-radius: 6px; background: rgba(255,255,255,0.04); border: 1px solid var(--border); }
  .record-chip.wins { border-color: rgba(168,155,249,0.3); background: rgba(168,155,249,0.06); }
  .record-chip.losses { border-color: rgba(255,107,107,0.3); background: rgba(255,107,107,0.06); }
  .record-chip.ties { border-color: rgba(255,255,255,0.12); }
  .record-num { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 1.4rem; line-height: 1; }
  .record-chip.wins .record-num { color: var(--green-light); }
  .record-chip.losses .record-num { color: var(--fwd); }
  .record-chip.ties .record-num { color: var(--gray); }
  .record-lbl { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gray); }
  .game-results { display: flex; flex-direction: column; gap: 4px; margin-top: 8px; }

<script type="module">
// ── FIREBASE ──────────────────────────────────────────────────────────────────
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, setDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyCJpTcL7cjKONJBIk3YXVqu-Q59qRH_1as",
  authDomain: "soccer-lineup-f253e.firebaseapp.com",
  projectId: "soccer-lineup-f253e",
  storageBucket: "soccer-lineup-f253e.firebasestorage.app",
  messagingSenderId: "576791272410",
  appId: "1:576791272410:web:720105bf399d17fec03ee3"
};

const fbApp = initializeApp(firebaseConfig);
const db    = getFirestore(fbApp);
const DOC   = doc(db, 'lineups', 'main');

// Expose to main script
window._db  = db;
window._doc = DOC;
window._setDoc = setDoc;

// Listen for remote changes and update local state
window._startSync = function(onRemoteUpdate) {
  return onSnapshot(DOC, snap => {
    if (!snap.exists()) return;
    onRemoteUpdate(snap.data());
  });
};

<script>
// ── HEADER MENU ───────────────────────────────────────────────────────────────
function toggleHeaderMenu() {
  document.getElementById('headerDropdown').classList.toggle('open');
}
function closeHeaderMenu() {
  document.getElementById('headerDropdown').classList.remove('open');
}
document.addEventListener('click', function(e) {
  if (!e.target.closest('.header-menu-wrap')) closeHeaderMenu();
});

// ── FIREBASE SYNC ─────────────────────────────────────────────────────────────
let _lastSaveTime = 0;

function saveToFirebase() {
  if (!window._doc || !window._setDoc) return;
  _lastSaveTime = Date.now();
  const data = { players, goals, games, curGame };
  window._setDoc(window._doc, data)
    .then(() => showSyncStatus('saved'))
    .catch(() => showSyncStatus('error'));
}

function loadFromFirebase(data) {
  // Skip if we just saved (echo prevention), but never skip on initial load (_lastSaveTime === 0)
  if (_lastSaveTime !== 0 && Date.now() - _lastSaveTime < 2000) return;
  if (data.players) players = data.players.map(p =>
    typeof p === 'string' ? { name: p, active: true } : { name: p.name || String(p), active: p.active !== false }
  );
  if (data.goals)   goals   = data.goals;
  if (data.games)   games   = data.games.map(g => ({
    ...g,
    opponentScore: g.opponentScore || 0,
    completed: g.completed || false,
    rotations: g.rotations.map(r => {
      ensureShape(r);
      // Sanitize — ensure all slot values and bench are plain strings
      POSITIONS.forEach(pos => {
        r[pos] = r[pos].map(p => {
          if (!p) return null;
          return typeof p === 'string' ? p : (p.name || null);
        });
      });
      r.bench = r.bench.map(p => typeof p === 'string' ? p : (p.name || null)).filter(Boolean);
      return r;
    })
  }));
  if (typeof data.curGame === 'number') curGame = data.curGame;
  // Suppress save triggered by renderAll during load
  const savedLastSave = _lastSaveTime;
  _lastSaveTime = Date.now();
  renderAll();
  _lastSaveTime = savedLastSave;
}

// ── SYNC STATUS ───────────────────────────────────────────────────────────────
function showSyncStatus(state) {
  let el = document.getElementById('syncStatus');
  if (!el) return;
  if (state === 'saving') { el.innerHTML = '<i class="ti ti-cloud-upload"></i> Saving…'; el.style.color = 'rgba(255,255,255,0.4)'; }
  else if (state === 'saved') { el.innerHTML = '<i class="ti ti-cloud"></i> Synced'; el.style.color = 'rgba(168,155,249,0.7)'; }
  else if (state === 'error') { el.innerHTML = '<i class="ti ti-cloud-off"></i> Offline'; el.style.color = '#f97b8b'; }
}

function hideLoadingOverlay() {
  const el = document.getElementById('loadingOverlay');
  if (!el) return;
  el.style.opacity = '0';
  setTimeout(() => el.remove(), 400);
}


const POSITIONS   = ['def','mid','fwd'];
const POS_LABELS  = { def:'Defenders', mid:'Midfielders', fwd:'Forwards' };
const POS_COLORS  = { def:'var(--def)', mid:'var(--mid)', fwd:'var(--fwd)' };
const SLOTS_PER   = 2;
const NUM_ROT     = 6;
const FIELD_SIZE  = 6;

// ── STATE ──────────────────────────────────────────────────────────────────────
let players = [
  'Alex','Jordan','Sam','Riley','Casey','Morgan','Taylor','Quinn','Drew','Avery','Blake'
].map(name => ({ name, active: true }));
let goals   = {};   // { playerName: { gameIdx: count } }
let games   = [{ name:'Game 1', rotations: emptyRotations(), opponentScore: 0, completed: false }];
let curGame = 0;
let drag    = null;
let swapSel = null;
let slotMenuSel = null;

// Helper — only active player names
function activePlayers() { return players.filter(p => p.active).map(p => p.name); }
let statsScope = 'game';
function emptyRotations() {
  return Array.from({ length: NUM_ROT }, () => ({
    def: [null,null], mid: [null,null], fwd: [null,null],
    bench: [],
    played: false,
    locked: { def:[false,false], mid:[false,false], fwd:[false,false] }
  }));
}

function ensureShape(rot) {
  if (!rot.locked) rot.locked = { def:[false,false], mid:[false,false], fwd:[false,false] };
  if (rot.played === undefined) rot.played = false;
}

// ── GOALS HELPERS ─────────────────────────────────────────────────────────────
function getGoals(name, gIdx) { return goals[name]?.[gIdx] || 0; }
function setGoals(name, gIdx, v) {
  if (!goals[name]) goals[name] = {};
  goals[name][gIdx] = Math.max(0, v);
  renderStats();
}
function totalGoals(name) {
  if (!goals[name]) return 0;
  return Object.values(goals[name]).reduce((a,b)=>a+b,0);
}

// ── RENDER ALL ────────────────────────────────────────────────────────────────
function renderAll() {
  renderPlayers(); renderGameTabs(); renderRotations(); renderStats(); renderSeasonRecord();
}

function renderAndSave() {
  renderAll();
  // Debounced save to Firebase
  clearTimeout(window._saveTimer);
  window._saveTimer = setTimeout(() => {
    showSyncStatus('saving');
    saveToFirebase();
  }, 600);
}

// ── PLAYERS ───────────────────────────────────────────────────────────────────
function renderPlayers() {
  const list = document.getElementById('playerList');
  list.innerHTML = '';
  if (players.length === 0) {
    list.innerHTML = `<div class="empty-state"><i class="ti ti-users"></i><p><strong>No players yet</strong>Add your first player below</p></div>`;
    return;
  }
  players.forEach((p, i) => {
    const chip = document.createElement('div');
    chip.className = 'player-chip' + (p.active ? '' : ' inactive');
    chip.innerHTML = `
      <div class="player-num">${i+1}</div>
      <input class="player-name-input" value="${p.name}" maxlength="20"
        onchange="renamePlayer(${i},this.value)" onclick="event.stopPropagation()"/>
      <button class="active-toggle ${p.active ? 'is-active' : ''}" onclick="toggleActive(${i})" title="${p.active ? 'Mark inactive' : 'Mark active'}">
        <i class="ti ${p.active ? 'ti-circle-check' : 'ti-circle-x'}"></i>
      </button>
      <button class="btn-danger" onclick="removePlayer(${i})"><i class="ti ti-x"></i></button>`;
    list.appendChild(chip);
  });
}


function addPlayer() {
  const inp = document.getElementById('newPlayerName');
  const n = inp.value.trim();
  if (!n || players.some(p => p.name === n)) { inp.focus(); return; }
  players.push({ name: n, active: true });
  inp.value = '';
  renderAndSave();
}

function removePlayer(i) {
  const name = players[i].name;
  const hasHistory = games.some(g =>
    g.completed && g.rotations.some(r =>
      POSITIONS.some(pos => r[pos].includes(name))
    )
  );
  if (hasHistory) {
    if (!confirm(`${name} has played in completed games. Their stats will be removed. Delete anyway?`)) return;
  }
  players.splice(i, 1);
  games.forEach(g => g.rotations.forEach(rot => {
    ensureShape(rot);
    POSITIONS.forEach(pos => { rot[pos] = rot[pos].map(p => p === name ? null : p); });
    rot.bench = rot.bench.filter(p => p !== name);
  }));
  renderAndSave();
}

function toggleActive(i) {
  players[i].active = !players[i].active;
  renderAndSave();
}

function renamePlayer(i, newName) {
  const old = players[i].name, n = newName.trim();
  if (!n || players.some(p => p.name === n)) return;
  players[i].name = n;
  if (goals[old]) { goals[n] = goals[old]; delete goals[old]; }
  games.forEach(g => g.rotations.forEach(rot => {
    POSITIONS.forEach(pos => { rot[pos] = rot[pos].map(p => p === old ? n : p); });
    rot.bench = rot.bench.map(p => p === old ? n : p);
  }));
  renderAndSave();
}


// ── GAME TABS ─────────────────────────────────────────────────────────────────
function renderGameTabs() {
  const el = document.getElementById('gameTabs');
  el.innerHTML = '';
  games.forEach((g,i) => {
    const btn = document.createElement('button');
    btn.className = 'game-tab' + (i===curGame?' active':'');
    btn.textContent = g.name;
    btn.onclick = () => { curGame = i; renderAndSave(); };
    el.appendChild(btn);
  });
  const add = document.createElement('button');
  add.className = 'btn-new-game';
  add.textContent = '+ New Game';
  add.onclick = () => openModal('newGameModal');
  el.appendChild(add);
  document.getElementById('headerGameName').textContent = games[curGame].name;
  // Update rotation indicator
  const rots = games[curGame].rotations;
  const playedCount = rots.filter(r => r.played).length;
  const rotLabel = document.getElementById('currentRotationLabel');
  const headerRotLabel = document.getElementById('headerRotationLabel');
  if (playedCount === rots.length) {
    rotLabel.textContent = 'Game Complete';
    headerRotLabel.textContent = 'Game Complete';
  } else {
    rotLabel.textContent = `Rotation ${playedCount + 1} of ${rots.length}`;
    headerRotLabel.textContent = `Rotation ${playedCount + 1} of ${rots.length}`;
  }
  rotLabel.style.display = 'inline-block';
  headerRotLabel.style.display = 'inline-block';
}

function openModal(id) {
  document.getElementById(id).classList.add('open');
  if (id==='newGameModal') setTimeout(()=>document.getElementById('newGameName').focus(),50);
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  if (id==='newGameModal') document.getElementById('newGameName').value='';
}
function confirmNewGame() {
  const n = document.getElementById('newGameName').value.trim() || `Game ${games.length+1}`;
  games.push({ name:n, rotations:emptyRotations(), opponentScore: 0, completed: false });
  curGame = games.length-1;
  closeModal('newGameModal');
  renderAndSave();
}
function clearGame() {
  if (!confirm('Clear all rotations in this game? Locks and played status will be reset.')) return;
  games[curGame].rotations = emptyRotations();
  renderAndSave();
}

// ── GOALS MODAL ───────────────────────────────────────────────────────────────
function getTeamScore(gIdx) {
  let total = 0;
  activePlayers().forEach(p => { total += getGoals(p, gIdx); });
  return total;
}

function getGameResult(gIdx) {
  const g = games[gIdx];
  if (!g.completed) return null;
  const us = getTeamScore(gIdx);
  const them = g.opponentScore || 0;
  if (us > them) return 'W';
  if (us < them) return 'L';
  return 'T';
}

function updateScoreSummary() {
  const g = games[curGame];
  const us = getTeamScore(curGame);
  const them = g.opponentScore || 0;
  const el = document.getElementById('scoreSummary');
  if (!el) return;
  let label, cls;
  if (us > them) { label = `Eagles ${us} – ${them}  ·  Winning`; cls = 'win'; }
  else if (us < them) { label = `Eagles ${us} – ${them}  ·  Losing`; cls = 'loss'; }
  else { label = `Eagles ${us} – ${them}  ·  Tied`; cls = 'tie'; }
  el.textContent = label;
  el.className = `score-summary ${cls}`;
}

function openGoalsModal() {
  const g = games[curGame];
  document.getElementById('goalsGameName').textContent = g.name;
  const list = document.getElementById('goalsList');
  list.innerHTML = '';
  players.forEach(({name: p}) => {
    const c = getGoals(p, curGame);
    const row = document.createElement('div');
    row.className = 'goal-row';
    row.innerHTML = `
      <span class="gname">${p}</span>
      <div class="goal-stepper">
        <button onclick="adjGoal('${p}',-1)">−</button>
        <span class="goal-count" id="gc-${p}">${c}</span>
        <button onclick="adjGoal('${p}',1)">+</button>
      </div>`;
    list.appendChild(row);
  });
  document.getElementById('opponentCount').textContent = g.opponentScore || 0;
  updateScoreSummary();
  const allPlayed = g.rotations.every(r => r.played);
  const completeBtn = document.getElementById('completeGameBtn');
  completeBtn.style.display = allPlayed ? 'inline-flex' : 'none';
  if (allPlayed) {
    completeBtn.innerHTML = g.completed
      ? '<i class="ti ti-trophy"></i> Completed'
      : '<i class="ti ti-trophy"></i> Complete Game';
    completeBtn.className = g.completed ? 'btn btn-secondary' : 'btn btn-primary';
  }
  openModal('goalsModal');
}

function adjGoal(name, delta) {
  const nv = Math.max(0, getGoals(name, curGame) + delta);
  setGoals(name, curGame, nv);
  const el = document.getElementById(`gc-${name}`);
  if (el) el.textContent = nv;
  updateScoreSummary();
}

function adjOpponent(delta) {
  const g = games[curGame];
  g.opponentScore = Math.max(0, (g.opponentScore || 0) + delta);
  document.getElementById('opponentCount').textContent = g.opponentScore;
  updateScoreSummary();
  renderSeasonRecord();
}

function completeGame() {
  games[curGame].completed = !games[curGame].completed;
  renderSeasonRecord();
  openGoalsModal();
}

function renderSeasonRecord() {
  let w = 0, l = 0, t = 0;
  const resultsEl = document.getElementById('gameResults');
  if (!resultsEl) return;
  resultsEl.innerHTML = '';
  games.forEach((g, i) => {
    const result = getGameResult(i);
    if (result === 'W') w++;
    else if (result === 'L') l++;
    else if (result === 'T') t++;
    if (g.completed) {
      const us = getTeamScore(i), them = g.opponentScore || 0;
      const row = document.createElement('div');
      row.className = 'game-result-row';
      row.innerHTML = `
        <span class="gr-name">${g.name}</span>
        <span class="gr-score">${us}–${them}</span>
        <span class="gr-badge ${result}">${result}</span>`;
      resultsEl.appendChild(row);
    }
  });
  document.getElementById('recWins').textContent = w;
  document.getElementById('recLosses').textContent = l;
  document.getElementById('recTies').textContent = t;
  // Empty state
  const hasCompleted = games.some(g => g.completed);
  if (!hasCompleted) {
    resultsEl.innerHTML = `<div class="empty-state"><i class="ti ti-trophy"></i><p><strong>No games completed yet</strong>Complete a game to see your record</p></div>`;
  }
}

// ── ROTATIONS ─────────────────────────────────────────────────────────────────
function renderRotations() {
  const container = document.getElementById('rotationsContainer');
  container.innerHTML = '';
  const game = games[curGame];
  updateNotice(game);

  game.rotations.forEach((rot, rIdx) => {
    ensureShape(rot);
    const card = document.createElement('div');
    card.className = 'rotation-card' + (rot.played?' is-played':'');

    // ── Header
    const hdr = document.createElement('div');
    hdr.className = 'rotation-header';

    const numEl = document.createElement('span');
    numEl.className = 'rotation-num';
    numEl.textContent = `Rotation ${rIdx+1}`;
    hdr.appendChild(numEl);

    // Determine badge state
    const currentRIdx = game.rotations.findIndex(r => !r.played);
    const badge = document.createElement('span');
    if (rot.played) {
      badge.className = 'played-badge';
      badge.innerHTML = '<i class="ti ti-circle-check"></i> Played';
    } else if (rIdx === currentRIdx) {
      badge.className = 'current-badge';
      badge.innerHTML = '<i class="ti ti-player-play"></i> Current';
    } else {
      badge.className = 'upcoming-badge';
      badge.innerHTML = '<i class="ti ti-clock"></i> Upcoming';
    }
    hdr.appendChild(badge);

    const prevPlayed = rIdx === 0 || game.rotations[rIdx - 1].played;
    const nextPlayed = rIdx < game.rotations.length - 1 && game.rotations[rIdx + 1].played;
    const toggleDisabled = (!rot.played && !prevPlayed) || (rot.played && nextPlayed);

    const toggle = document.createElement('label');
    toggle.className = 'played-toggle' + (rot.played?' on':'') + (toggleDisabled?' disabled':'');
    toggle.style.opacity = toggleDisabled ? '0.35' : '1';
    toggle.style.cursor = toggleDisabled ? 'not-allowed' : 'pointer';
    toggle.innerHTML = `
      <input type="checkbox" ${rot.played?'checked':''} ${toggleDisabled?'disabled':''}>
      <span class="toggle-label">${rot.played?'Played':'Mark Played'}</span>
      <div class="toggle-track"></div>`;
    toggle.querySelector('input').addEventListener('change', e => {
      rot.played = e.target.checked;
      renderAndSave();
    });
    hdr.appendChild(toggle);
    card.appendChild(hdr);

    // ── Field
    const field = document.createElement('div');
    field.className = 'rotation-field';
    POSITIONS.forEach(pos => {
      const grp = document.createElement('div');
      grp.className = 'position-group';
      grp.innerHTML = `
        <div class="position-label">
          <div class="pos-dot" style="background:${POS_COLORS[pos]}"></div>
          ${POS_LABELS[pos]}
        </div>
        <div class="position-slots" id="slots-${rIdx}-${pos}"></div>`;
      field.appendChild(grp);
    });
    card.appendChild(field);

    // ── Bench
    const bench = document.createElement('div');
    bench.className = 'bench-row';
    bench.innerHTML = `<span class="bench-label">Bench</span><div class="bench-slots" id="bench-${rIdx}"></div>`;
    card.appendChild(bench);

    container.appendChild(card);

    // Populate
    POSITIONS.forEach(pos => {
      const slotsDiv = document.getElementById(`slots-${rIdx}-${pos}`);
      rot[pos].forEach((p,sIdx) => {
        slotsDiv.appendChild(makeSlot(p, pos, rIdx, sIdx, rot.locked[pos][sIdx], rot.played));
      });
    });
    makeBench(rIdx, rot.bench, rot.played);
  });
  renderSnapDots();
}

function makeSlot(playerName, pos, rIdx, sIdx, locked, isPlayed) {
  // A slot is a valid swap target if a bench player is selected for this rotation
  const isSwapTarget = swapSel && swapSel.rIdx===rIdx && !isPlayed && !locked;
  const slot = document.createElement('div');
  slot.className = ['slot', pos, playerName?'filled':'', locked?'locked':'', isSwapTarget?'swap-target':''].filter(Boolean).join(' ');

  if (playerName) {
    const inner = document.createElement('div');
    inner.className = 'slot-inner';
    if (!isPlayed) inner.draggable = true;

    const lockBtn = document.createElement('button');
    lockBtn.className = 'lock-btn';
    lockBtn.title = locked ? 'Unlock slot' : 'Lock slot';
    lockBtn.innerHTML = locked ? '<i class="ti ti-lock"></i>' : '<i class="ti ti-lock-open"></i>';
    lockBtn.onclick = e => {
      e.stopPropagation();
      games[curGame].rotations[rIdx].locked[pos][sIdx] = !locked;
      renderAndSave();
    };

    const nameEl = document.createElement('span');
    nameEl.className = 'slot-name';
    nameEl.textContent = playerName;

    // Mobile swap button (opens dropdown)
    const swapBtn = document.createElement('button');
    swapBtn.className = 'swap-btn';
    swapBtn.title = 'Swap player';
    swapBtn.innerHTML = '<i class="ti ti-replace-user"></i>';
    const isMenuOpen = slotMenuSel && slotMenuSel.rIdx === rIdx && slotMenuSel.pos === pos && slotMenuSel.sIdx === sIdx;
    if (isMenuOpen) swapBtn.classList.add('active');
    swapBtn.onclick = e => {
      e.stopPropagation();
      slotMenuSel = isMenuOpen ? null : { rIdx, pos, sIdx };
      renderAndSave();
    };

    inner.appendChild(lockBtn);
    inner.appendChild(nameEl);
    if (!isPlayed && !locked) inner.appendChild(swapBtn);
    slot.appendChild(inner);

    // Dropdown — appended to slot (position:relative), floats below slot-inner
    if (isMenuOpen && !isPlayed) {
      const dropdown = document.createElement('div');
      dropdown.className = 'slot-dropdown ' + (pos === 'def' ? 'opens-down' : 'opens-up');
      const rot = games[curGame].rotations[rIdx];
      POSITIONS.forEach(tPos => {
        if (tPos === pos) return; // skip same position entirely
        rot[tPos].forEach((tName, tIdx) => {
          if (!tName || rot.locked[tPos][tIdx]) return;
          const opt = document.createElement('div');
          opt.className = 'swap-option';
          opt.innerHTML = `
            <div class="swap-pos-dot" style="background:${POS_COLORS[tPos]}"></div>
            <span>${tName}</span>
            <span class="swap-pos-label">${POS_LABELS[tPos].slice(0,-1)}</span>`;
          opt.addEventListener('click', e => {
            e.stopPropagation();
            rot[tPos][tIdx] = playerName;
            rot[pos][sIdx] = tName;
            slotMenuSel = null;
            renderAndSave();
          });
          dropdown.appendChild(opt);
        });
      });
      slot.appendChild(dropdown);
    }

    if (!isPlayed) {
      inner.addEventListener('dragstart', e => {
        if (locked) { e.preventDefault(); return; }
        drag = { type:'slot', rIdx, pos, sIdx, playerName };
        e.dataTransfer.effectAllowed = 'move';
      });
    }
  } else {
    const empty = document.createElement('span');
    empty.className = 'slot-empty';
    empty.textContent = 'Drop here';
    slot.appendChild(empty);
  }

  // Bench→field tap-swap
  if (isSwapTarget) {
    slot.addEventListener('click', e => {
      e.stopPropagation();
      const rot = games[curGame].rotations[rIdx];
      const benchName = swapSel.playerName;
      const fieldName = rot[pos][sIdx];
      rot[pos][sIdx] = benchName;
      rot.bench = rot.bench.filter(p => p !== benchName);
      if (fieldName && !rot.locked[pos][sIdx]) rot.bench.push(fieldName);
      swapSel = null;
      renderAndSave();
    });
  }

  if (!isPlayed) {
    slot.addEventListener('dragover', e => { e.preventDefault(); slot.classList.add('drag-target'); });
    slot.addEventListener('dragleave', () => slot.classList.remove('drag-target'));
    slot.addEventListener('drop', e => {
      e.preventDefault(); slot.classList.remove('drag-target');
      handleDrop({ type:'slot', rIdx, pos, sIdx });
      renderAndSave();
    });
  }
  return slot;
}

function makeBench(rIdx, benchNames, isPlayed) {
  const div = document.getElementById(`bench-${rIdx}`);
  div.innerHTML = '';
  const rot = games[curGame].rotations[rIdx];
  const onField = new Set();
  POSITIONS.forEach(pos => rot[pos].forEach(p => { if(p) onField.add(p); }));
  const available = activePlayers().filter(p => !onField.has(p) && !benchNames.includes(p));

  [...benchNames, ...available].forEach(p => {
    const isFilled = benchNames.includes(p);
    const s = document.createElement('div');
    const isSelected = swapSel && swapSel.rIdx===rIdx && swapSel.playerName===p;
    s.className = 'bench-slot' + (isFilled?' filled':'') + (isSelected?' swap-selected':'');
    s.textContent = p;

    if (isFilled && !isPlayed) {
      s.draggable = true;
      s.addEventListener('dragstart', e => {
        drag = { type:'bench', rIdx, playerName:p };
        e.dataTransfer.effectAllowed = 'move';
      });
      // Tap to select for swap
      s.addEventListener('click', () => {
        if (swapSel && swapSel.rIdx===rIdx && swapSel.playerName===p) {
          swapSel = null; // deselect
        } else {
          swapSel = { rIdx, playerName:p };
        }
        renderAndSave();
      });
    }
    if (!isPlayed) {
      s.addEventListener('dragover', e => { e.preventDefault(); s.classList.add('drag-target'); });
      s.addEventListener('dragleave', () => s.classList.remove('drag-target'));
      s.addEventListener('drop', e => {
        e.preventDefault(); s.classList.remove('drag-target');
        handleDrop({ type:'bench', rIdx });
        renderAndSave();
      });
    }
    div.appendChild(s);
  });
}

function handleDrop(target) {
  if (!drag) return;
  const game = games[curGame];
  const srcName = drag.playerName;
  if (!srcName) return;

  // Block drop onto a locked filled slot
  if (target.type==='slot') {
    const tLocked = game.rotations[target.rIdx].locked[target.pos][target.sIdx];
    const tName   = game.rotations[target.rIdx][target.pos][target.sIdx];
    if (tLocked && tName) { drag=null; return; }
  }

  let displaced = null;
  if (target.type==='slot') displaced = game.rotations[target.rIdx][target.pos][target.sIdx];

  // Clear source
  if (drag.type==='slot') {
    game.rotations[drag.rIdx][drag.pos][drag.sIdx] = null;
  } else if (drag.type==='bench') {
    game.rotations[drag.rIdx].bench = game.rotations[drag.rIdx].bench.filter(p=>p!==srcName);
  }

  // Place in target
  if (target.type==='slot') {
    game.rotations[target.rIdx][target.pos][target.sIdx] = srcName;
    if (displaced) {
      if (drag.type==='slot' && drag.rIdx===target.rIdx) {
        // Swap within same rotation
        game.rotations[drag.rIdx][drag.pos][drag.sIdx] = displaced;
      } else {
        if (!game.rotations[target.rIdx].bench.includes(displaced))
          game.rotations[target.rIdx].bench.push(displaced);
      }
    }
  } else if (target.type==='bench') {
    if (!game.rotations[target.rIdx].bench.includes(srcName))
      game.rotations[target.rIdx].bench.push(srcName);
  }

  drag = null;
}

// ── AUTO-GENERATE ─────────────────────────────────────────────────────────────
// Respects: played rotations (frozen), locked slots (fixed), cross-game history
function autoGenerate() {
  if (activePlayers().length < FIELD_SIZE) { alert('Need at least 6 players.'); return; }

  const game = games[curGame];

  // Cumulative counts from PLAYED rotations across ALL games (including current)
  const counts = {};
  activePlayers().forEach(p => counts[p] = { def:0, mid:0, fwd:0, total:0 });

  games.forEach(g => {
    g.rotations.forEach(rot => {
      ensureShape(rot);
      if (!rot.played) return;
      POSITIONS.forEach(pos => {
        rot[pos].forEach(p => { if(p && counts[p]) { counts[p][pos]++; counts[p].total++; } });
      });
    });
  });

  // Now fill each UNPLAYED rotation in current game
  game.rotations.forEach((rot, rIdx) => {
    ensureShape(rot);
    if (rot.played) return; // leave played rotations untouched

    // Collect locked assignments
    const lockedNames = new Set();
    POSITIONS.forEach(pos => {
      rot[pos].forEach((p, sIdx) => {
        if (rot.locked[pos][sIdx] && p) lockedNames.add(p);
      });
    });

    // Clear only UNLOCKED slots and bench
    POSITIONS.forEach(pos => {
      rot[pos].forEach((p, sIdx) => {
        if (!rot.locked[pos][sIdx]) rot[pos][sIdx] = null;
      });
    });
    rot.bench = [];

    // Slots that need filling (unlocked, currently null)
    const openSlots = [];
    POSITIONS.forEach(pos => {
      rot[pos].forEach((p, sIdx) => {
        if (!rot.locked[pos][sIdx]) openSlots.push({ pos, sIdx });
      });
    });

    const openCount = openSlots.length; // how many players to put on field
    const available = activePlayers().filter(p => !lockedNames.has(p));

    // Sort available by total played (ascending) for even time
    const sorted = available.sort((a,b) => counts[a].total - counts[b].total);
    const onField = sorted.slice(0, openCount);
    const bench   = sorted.slice(openCount);
    rot.bench = bench;

    // Group open slots by position
    const byPos = { def:[], mid:[], fwd:[] };
    openSlots.forEach(s => byPos[s.pos].push(s.sIdx));

    // Assign greedily: for each position, pick players with fewest plays there
    const remaining = shuffleArr([...onField]);
    POSITIONS.forEach(pos => {
      if (!byPos[pos].length) return;
      remaining.sort((a,b) => counts[a][pos] - counts[b][pos]);
      byPos[pos].forEach(sIdx => {
        const p = remaining.shift();
        if (p) {
          rot[pos][sIdx] = p;
          counts[p][pos]++;
          counts[p].total++;
        }
      });
    });
  });

  renderAndSave();
}

function shuffleArr(arr) {
  for (let i=arr.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

// ── STATS ─────────────────────────────────────────────────────────────────────
function getGameStats() {
  const s = {};
  players.forEach(p => s[p.name] = { def:0, mid:0, fwd:0, total:0, goals:0 });
  const g = games[curGame];
  g.rotations.forEach(rot => {
    ensureShape(rot);
    POSITIONS.forEach(pos => rot[pos].forEach(p => {
      if (p && s[p]) { s[p][pos]++; s[p].total++; }
    }));
  });
  players.forEach(p => { s[p.name].goals += getGoals(p.name, curGame); });
  return s;
}

function getCumulativeStats() {
  const s = {};
  players.forEach(p => s[p.name] = { def:0, mid:0, fwd:0, total:0, goals:0 });
  games.forEach((g, gIdx) => {
    g.rotations.forEach(rot => {
      ensureShape(rot);
      POSITIONS.forEach(pos => rot[pos].forEach(p => {
        if (p && s[p]) { s[p][pos]++; s[p].total++; }
      }));
    });
    players.forEach(p => { s[p.name].goals += getGoals(p.name, gIdx); });
  });
  return s;
}

function setStatsScope(scope) {
  statsScope = scope;
  document.getElementById('segGame').classList.toggle('active', scope === 'game');
  document.getElementById('segSeason').classList.toggle('active', scope === 'season');
  renderStats();
}

function renderStats() {
  const grid = document.getElementById('statsGrid');
  const s = statsScope === 'season' ? getCumulativeStats() : getGameStats();
  grid.innerHTML = '';
  if (players.length === 0) {
    grid.innerHTML = `<div class="empty-state"><p>Add players to see stats</p></div>`;
    return;
  }
  [...players].map(p => p.name).sort((a,b) => s[b].total - s[a].total).forEach(p => {
    const row = document.createElement('div');
    row.className = 'stat-row' + (players.find(pl => pl.name === p)?.active === false ? ' inactive' : '');
    row.innerHTML = `
      <span class="sname">${p}</span>
      <span class="stat-val def">${s[p].def}</span>
      <span class="stat-val mid">${s[p].mid}</span>
      <span class="stat-val fwd">${s[p].fwd}</span>
      <span class="stat-val tot">${s[p].total}</span>
      <span class="stat-val goals">${s[p].goals > 0 ? s[p].goals : '—'}</span>`;
    grid.appendChild(row);
  });
}

function updateNotice(game) {
  const el = document.getElementById('balanceNotice');
  let unfilled = 0;
  game.rotations.forEach(rot => {
    if (rot.played) return;
    POSITIONS.forEach(pos => rot[pos].forEach(p => { if(!p) unfilled++; }));
  });
  if (unfilled === 0) { el.style.display='none'; return; }
  el.style.display = 'block';
  el.textContent = `${unfilled} slot${unfilled!==1?'s':''} unfilled in unplayed rotations. Hit Auto-Generate or drag from the sidebar.`;
}

document.addEventListener('keydown', e => {
  if (e.key==='Escape') {
    closeModal('newGameModal'); closeModal('goalsModal');
    if (swapSel) { swapSel = null; renderAndSave(); }
  }
});

document.addEventListener('click', e => {
  if (!swapSel) return;
  if (!e.target.closest('.bench-slot') && !e.target.closest('.swap-target')) {
    swapSel = null;
    renderAndSave();
  }
});

document.addEventListener('click', e => {
  if (!slotMenuSel) return;
  if (!e.target.closest('.swap-btn') && !e.target.closest('.slot-dropdown')) {
    slotMenuSel = null;
    renderAndSave();
  }
}, true);

// ── SNAP DOTS ─────────────────────────────────────────────────────────────────
function renderSnapDots() {
  const dotsEl = document.getElementById('snapDots');
  if (!dotsEl) return;
  dotsEl.innerHTML = '';
  // Only show on mobile
  if (window.innerWidth > 700) return;
  games[curGame].rotations.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'snap-dot' + (i === 0 ? ' active' : '');
    dot.dataset.idx = i;
    dotsEl.appendChild(dot);
  });
}

function updateSnapDots() {
  const container = document.getElementById('rotationsContainer');
  const dotsEl = document.getElementById('snapDots');
  if (!container || !dotsEl || window.innerWidth > 700) return;
  const cards = container.querySelectorAll('.rotation-card');
  if (!cards.length) return;
  const containerLeft = container.getBoundingClientRect().left;
  let closest = 0, minDist = Infinity;
  cards.forEach((card, i) => {
    const dist = Math.abs(card.getBoundingClientRect().left - containerLeft);
    if (dist < minDist) { minDist = dist; closest = i; }
  });
  dotsEl.querySelectorAll('.snap-dot').forEach((dot, i) => {
    dot.classList.toggle('active', i === closest);
  });
}

// ── INIT ──────────────────────────────────────────────────────────────────────
// Wire up scroll listeners
document.getElementById('rotationsContainer').addEventListener('scroll', updateSnapDots);
window.addEventListener('resize', () => { renderSnapDots(); updateSnapDots(); });

// Wait for Firebase — do NOT render or save until we know what's in the database
let _initialLoad = true;
function startFirebaseSync() {
  if (!window._startSync) {
    setTimeout(startFirebaseSync, 100);
    return;
  }
  window._startSync(data => {
    if (_initialLoad) {
      _initialLoad = false;
      const hasData = data && data.games && data.games.some(g =>
        g.rotations && g.rotations.some(r =>
          ['def','mid','fwd'].some(p => r[p] && r[p].some(Boolean))
        )
      );
      if (hasData) {
        _lastSaveTime = 0;
        loadFromFirebase(data);
      } else {
        // Nothing saved yet — render defaults and save them
        renderAndSave();
        autoGenerate();
      }
      hideLoadingOverlay();
      document.querySelector('.main').classList.add('fade-in');
    } else {
      loadFromFirebase(data);
    }
  });
}
startFirebaseSync();
</script>
